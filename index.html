<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniCast - スクショ特化型</title>
    <style>
        :root { --primary: #3db4f2; --bg: #0b1622; --card: #151f2e; --accent: #ff7edb; }
        body { font-family: sans-serif; background: var(--bg); color: #edf1f5; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .search-wrap { width: 100%; max-width: 450px; margin: 10px 0; display: flex; gap: 5px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; background: var(--card); color: white; }
        button { padding: 0 15px; background: var(--primary); border: none; border-radius: 8px; color: white; font-weight: bold; }
        
        /* スクショ映えするメインビジュアル */
        #header-area { width: 100%; max-width: 450px; text-align: center; display: none; margin-bottom: 20px; }
        #header-area img { width: 100%; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        
        /* リスト表示（スマホでスクショしやすい縦長） */
        .cast-list { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 10px; }
        .card { background: var(--card); border-radius: 12px; display: flex; align-items: center; overflow: hidden; height: 100px; }
        .thumb { width: 70px; height: 100px; object-fit: cover; }
        .info { flex: 1; padding: 0 15px; min-width: 0; }
        .c-name { font-weight: bold; font-size: 14px; margin-bottom: 5px; }
        .v-name { color: var(--accent); font-size: 13px; text-decoration: none; font-weight: bold; }
        .v-name:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="search-wrap">
    <input type="text" id="targetAnime" placeholder="アニメ名を入力">
    <button onclick="fetchData()">検索</button>
</div>

<div id="header-area">
    <img id="banner">
    <h2 id="title"></h2>
</div>

<div id="resultList" class="cast-list"></div>

<script>
async function fetchData() {
    const name = document.getElementById("targetAnime").value;
    if(!name) return;

    const list = document.getElementById("resultList");
    const header = document.getElementById("header-area");
    list.innerHTML = "検索中...";

    // 最も成功率の高い、シンプルなクエリに絞りました
    const query = `
    query ($search: String) {
      Media(search: $search, type: ANIME) {
        title { native }
        coverImage { extraLarge }
        characters(perPage: 15, sort: [ROLE, RELEVANCE]) {
          edges {
            node { name { full } image { large } }
            voiceActors(language: JAPANESE) { name { full } image { large } siteUrl }
          }
        }
      }
    }`;

    try {
        const res = await fetch("https://graphql.anilist.co", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query, variables: { search: name } })
        });
        const json = await res.json();
        const data = json.data.Media;

        if(!data) {
            list.innerHTML = "見つかりませんでした。";
            return;
        }

        // 表示処理
        header.style.display = "block";
        document.getElementById("banner").src = data.coverImage.extraLarge;
        document.getElementById("title").innerText = data.title.native;

        list.innerHTML = data.characters.edges.map(e => {
            const char = e.node;
            const va = e.voiceActors[0];
            if(!va) return "";
            return `
                <div class="card">
                    <img class="thumb" src="${char.image.large}">
                    <div class="info">
                        <div class="c-name">${char.name.full}</div>
                        <a href="${va.siteUrl}" target="_blank" class="v-name">CV: ${va.name.full} 🔗</a>
                    </div>
                    <img class="thumb" src="${va.image.large}">
                </div>
            `;
        }).join("");

    } catch (err) {
        list.innerHTML = "エラーが発生しました。";
    }
}
</script>
</body>
</html>
